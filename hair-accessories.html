  <link rel="stylesheet" href="styles.css">
  <style>
    .search-container {
      max-width: 600px;
      margin: 0 auto 4rem auto;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 1.2rem 2rem;
      border-radius: 30px;
      border: var(--glass-border);
      background: var(--glass-bg);
      box-shadow: var(--shadow-md);
      font-size: 1.1rem;
      outline: none;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      color: var(--text);
    }
    .search-input:focus {
      box-shadow: 0 15px 25px -5px rgba(108, 120, 92, 0.15);
      border-color: rgba(108, 120, 92, 0.3);
    }
    .search-icon {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      stroke: var(--text-light);
      fill: none;
      stroke-width: 2;
    }
    
    .product-card {
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      display: flex;
      flex-direction: column;
    }
    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
    }
    .product-image-container {
      border-radius: var(--radius-sm);
      overflow: hidden;
      margin-bottom: 1.5rem;
      aspect-ratio: 1;
    }
    .product-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }
    .product-card:hover img {
      transform: scale(1.03);
    }
    
    .no-results {
      text-align: center;
      padding: 4rem;
      color: var(--text-light);
      font-size: 1.2rem;
      display: none;
      grid-column: 1 / -1;
    }
  </style>
</head>

      <div class="global-search-container" style="position: relative; display: flex; align-items: center;">
        <input type="text" id="global-search-input" class="search-input-expand" placeholder="Search products...">
        <button class="search-btn" id="global-search-btn" aria-label="Search" style="background: none; border: none; cursor: pointer; color: var(--text); padding: 0.5rem; transition: color 0.3s ease;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text)'">
          <svg viewBox="0 0 24 24" style="width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2;">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" x2="16.65" y1="21" y2="16.65"></line>
          </svg>
        </button>
        <div id="search-results-dropdown" class="search-results-dropdown"></div>
      </div>
      <div class="user-auth-container" style="position: relative;">
        <button class="user-btn" id="user-auth-btn" aria-label="Account" onclick="window.location.href='auth.html'">
          <span class="user-btn-label">Sign In</span>
        </button>
        <div class="user-dropdown" id="user-dropdown"></div>
      </div>
      <button class="cart-btn" onclick="window.location.href='checkout.html'" aria-label="View Cart">
        <svg viewBox="0 0 24 24">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"></path>
        </svg>
        <span class="cart-badge" id="cart-count">0</span>
      </button>
    </div>
  </nav>
