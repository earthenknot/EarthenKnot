        <!-- Sign In Form -->

            <div class="input-wrapper">

            </div>
          </div>
          <div class="form-group">
            <label for="signin-password">Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <input type="password" id="signin-password" placeholder="Enter your password" required autocomplete="current-password" minlength="6">
              <button type="button" class="toggle-password-btn" data-target="signin-password" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary auth-submit-btn" id="signin-btn">
            <span class="btn-text">Sign In</span>
            <span class="btn-loader" style="display:none;">
              <svg viewBox="0 0 24 24" style="width:20px;height:20px;animation:spin 1s linear infinite;"><circle cx="12" cy="12" r="10" stroke="white" stroke-width="3" fill="none" stroke-dasharray="31.4 31.4" stroke-linecap="round"/></svg>
            </span>
          </button>
          <p class="auth-toggle">Don't have an account? <a href="#" id="show-signup">Create one</a></p>
        </form>

        <!-- Create Account Form (hidden by default) -->
        <form id="signup-form" class="auth-form" style="display: none;">
          <div class="form-group">
            <label for="signup-name">Full Name</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" id="signup-name" placeholder="Your full name" required autocomplete="name">
            </div>
          </div>
          <div class="form-group">
            <label for="signup-email">Email Address</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email">
            </div>
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <input type="password" id="signup-password" placeholder="Min 6 characters" required autocomplete="new-password" minlength="6">
              <button type="button" class="toggle-password-btn" data-target="signup-password" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="signup-confirm">Confirm Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/><circle cx="12" cy="16" r="1"/></svg>
              <input type="password" id="signup-confirm" placeholder="Re-enter your password" required autocomplete="new-password" minlength="6">
              <button type="button" class="toggle-password-btn" data-target="signup-confirm" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary auth-submit-btn" id="signup-btn">
            <span class="btn-text">Create Account</span>
            <span class="btn-loader" style="display:none;">
              <svg viewBox="0 0 24 24" style="width:20px;height:20px;animation:spin 1s linear infinite;"><circle cx="12" cy="12" r="10" stroke="white" stroke-width="3" fill="none" stroke-dasharray="31.4 31.4" stroke-linecap="round"/></svg>
            </span>
          </button>
          <p class="auth-toggle">Already have an account? <a href="#" id="show-signin">Sign in</a></p>
        </form>

  <script src="script.js"></script>
  <script type="module" src="firebase-config.js"></script>
  <script type="module">
    import { auth, db } from './firebase-config.js';
    import { createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-auth.js";
    import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js";

    // Toast helper
    function showToast(message, type = 'success') {
      const toast = document.getElementById('auth-toast');
      toast.textContent = message;
      toast.className = 'auth-toast ' + type + ' show';
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    // Toggle loading state on button
    function setLoading(btn, loading) {
      const text = btn.querySelector('.btn-text');
      const loader = btn.querySelector('.btn-loader');
      if (loading) {
        text.style.display = 'none';
        loader.style.display = 'inline-flex';
        btn.disabled = true;
      } else {
        text.style.display = 'inline';
        loader.style.display = 'none';
        btn.disabled = false;
      }
    }

    // Check for placeholder credentials on page load
    document.addEventListener('DOMContentLoaded', () => {
      if (auth.config && auth.config.apiKey === "YOUR_API_KEY") {
        showToast('Firebase config is not set up! Please edit firebase-config.js with your project credentials.', 'error');
      }
    });

    // === Toggle between Sign In / Sign Up ===
    document.getElementById('show-signup').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('signin-form').style.display = 'none';
      document.getElementById('signup-form').style.display = 'block';
      document.getElementById('auth-title').textContent = 'Create Account';
      document.getElementById('auth-subtitle').textContent = 'Join the EarthenKnot community';
    });

    document.getElementById('show-signin').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('signup-form').style.display = 'none';
      document.getElementById('signin-form').style.display = 'block';
      document.getElementById('auth-title').textContent = 'Welcome Back';
      document.getElementById('auth-subtitle').textContent = 'Sign in to your EarthenKnot account';
    });

    // === Sign In ===
    document.getElementById('signin-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('signin-btn');
      const email = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;

      if (auth.config && auth.config.apiKey === "YOUR_API_KEY") {
        showToast('Cannot sign in: Firebase credentials are placeholder values in firebase-config.js', 'error');
        return;
      }

      setLoading(btn, true);
      try {
        await signInWithEmailAndPassword(auth, email, password);
        showToast('Welcome back! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'index.html', 500);
      } catch (error) {
        console.error('Firebase Auth sign in failed:', error);
        let msg = `Sign in failed: ${error.message} (${error.code})`;
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
          msg = 'Invalid email or password.';
        } else if (error.code === 'auth/too-many-requests') {
          msg = 'Too many attempts. Please try later.';
        }
        showToast(msg, 'error');
        setLoading(btn, false);
      }
    });

    // === Create Account ===
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('signup-btn');
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;

      if (auth.config && auth.config.apiKey === "YOUR_API_KEY") {
        showToast('Cannot create account: Firebase credentials are placeholder values in firebase-config.js', 'error');
        return;
      }

      if (password !== confirm) {
        showToast('Passwords do not match.', 'error');
        return;
      }
      if (password.length < 6) {
        showToast('Password must be at least 6 characters.', 'error');
        return;
      }

      setLoading(btn, true);
      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        
        // Update Auth profile and Firestore database document in parallel for maximum speed!
        Promise.all([
          updateProfile(userCredential.user, { displayName: name }),
          setDoc(doc(db, 'users', userCredential.user.uid), {
            name: name,
            email: email,
            createdAt: serverTimestamp()
          })
        ]).catch(err => {
          console.error('Parallel registration write task failed:', err);
        });

        showToast('Account created! Welcome to EarthenKnot!', 'success');
        setTimeout(() => window.location.href = 'index.html', 500);
      } catch (error) {
        console.error('Firebase Auth sign up failed:', error);
        let msg = `Account creation failed: ${error.message} (${error.code})`;
        if (error.code === 'auth/email-already-in-use') {
          msg = 'This email is already registered. Try signing in.';
        } else if (error.code === 'auth/weak-password') {
          msg = 'Password is too weak. Use at least 6 characters.';
        } else if (error.code === 'auth/invalid-email') {
          msg = 'Please enter a valid email address.';
        }
        showToast(msg, 'error');
        setLoading(btn, false);
      }
    });

    // === Toggle Password Visibility ===
    document.querySelectorAll('.toggle-password-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const targetId = btn.getAttribute('data-target');
        const input = document.getElementById(targetId);
        if (!input) return;
        
        if (input.type === 'password') {
          input.type = 'text';
          // Slashed eye icon (hide)
          btn.innerHTML = `
            <svg viewBox="0 0 24 24">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          `;
        } else {
          input.type = 'password';
          // Regular eye icon (show)
          btn.innerHTML = `
            <svg viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          `;
        }
      });
    });
  </script>
